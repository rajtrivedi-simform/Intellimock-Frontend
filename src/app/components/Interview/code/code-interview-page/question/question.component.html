<div class="question-card">
  <h1>
    {{ question.title }} <span>({{ question.difficulty }})</span>
  </h1>

  <p class="description">{{ question.description }}</p>

  <div class="section">
    <h2>Input:</h2>
    <p>{{ question.input }}</p>
  </div>

  <div class="section">
    <h2>Output:</h2>
    <p>{{ question.output }}</p>
  </div>

  <div class="section">
    <h2>Constraints:</h2>
    <ul>
      <li *ngFor="let constraint of question.constraints">{{ constraint }}</li>
    </ul>
  </div>
</div>
