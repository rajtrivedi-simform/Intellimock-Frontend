<app-header></app-header>
<div class="mock-interview-container">
  <h1 class="page-title">Mock Interview <span>Session</span></h1>

  <div class="content">
    <!-- Left Section: Question + Answer -->
    <div class="left-section">
      <div class="question-block">
        <h2 class="section-title">Question {{ answeredQuestion + 1 }} of {{ question.length }}</h2>
        <p
          class="question-text"
          (copy)="$event.preventDefault()"
          (contextmenu)="$event.preventDefault()"
        >
          {{ question[answeredQuestion] }}
        </p>
      </div>

      <div class="answer-block">
        <h2 class="section-title">Your Answer</h2>
        <textarea
          [(ngModel)]="currentAnswer"
          (paste)="$event.preventDefault()"
          class="answer-input"
          placeholder="Type your answer here..."
        ></textarea>
      </div>

      <button (click)="nextQuestion()">
        {{ answeredQuestion < question.length - 1 ? 'Next' : 'Finish Interview' }}
      </button>
      <button (click)="nextQuestion()">skip</button>
    </div>

    <!-- Right Section: Webcam -->
    <div class="right-section">
      <h2 class="section-title">Your Webcam</h2>
      <div class="video-container">
        <video autoplay #videoElement></video>
      </div>
    </div>
  </div>
</div>
