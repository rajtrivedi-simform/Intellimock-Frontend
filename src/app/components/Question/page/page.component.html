<app-header></app-header>
<div class="question-container">
  <div class="question-card">
    <h2>{{ questionData?.data?.question }}</h2>
    <p>Level: {{ questionData?.data?.level }}</p>
    <p>Skill: {{ questionData?.data?.skill }}</p>
    <p>Type: {{ questionData?.data?.type }}</p>
  </div>
  <div class="comments-container">
    <h1>Comments</h1>
    <div class="add-comment-container">
      <textarea
        name="newComment"
        class="add-comment-textarea"
        [(ngModel)]="newComment"
        placeholder="Add your comment here..."
      ></textarea>
      <button class="add-comment-btn" (click)="addComment()">Add Comment</button>
    </div>
    <div class="comment-list">
      <div class="comment-item" *ngFor="let comment of comments">
        <div class="comment-header">
          <i class="bi bi-person-circle"></i>
          <span class="comment-author">{{ comment.author }}</span>
          <span class="comment-time">{{ comment.timestamp | date: 'medium' }}</span>
        </div>
        <div class="comment-content">
          {{ comment.content }}
        </div>
      </div>
    </div>
  </div>
</div>
