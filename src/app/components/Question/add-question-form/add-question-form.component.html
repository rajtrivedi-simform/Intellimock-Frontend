<app-header></app-header>

<div class="add-form">
  <form [formGroup]="questionForm" (ngSubmit)="onSubmit()">
    <label for="question">Question:</label>
    <textarea id="question" formControlName="question"></textarea>
    <label for="skill">Skill:</label>
    <input id="skill" type="text" formControlName="skill" />
    <label for="level">Level:</label>
    <select id="level" formControlName="level">
      <option value="">Select level</option>
      <option value="Beginner (0-2 years)">Beginner</option>
      <option value="Intermediate (2-5 years)">Intermediate</option>
      <option value="Advanced (5+ years)">Advanced</option>
    </select>
    <label for="type">Type:</label>
    <select id="type" formControlName="type">
      <option value="">Select type</option>
      <option value="Technical">Technical</option>
      <option value="HR">HR</option>
      <option value="Coding">Coding</option>
    </select>
    <button type="submit" [disabled]="questionForm.invalid">Submit</button>
  </form>
</div>
