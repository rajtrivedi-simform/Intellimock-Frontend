<div class="user-form-container">
  <div class="user-form-card">
    <h1>Update Your Profile</h1>

    <form (ngSubmit)="submitForm()">
      <div class="form-group">
        <label for="resume">Upload Resume (PDF only)</label>
        <div class="file-upload">
          <input type="file" id="resume" (change)="onResumeUpload($event)" accept=".pdf" required />
          <span class="file-hint">Drop your resume here or click to browse</span>
        </div>
      </div>

      <div class="skills-list" *ngIf="data.tokens?.length">
        <h3>Extracted Skills</h3>
        @for (skill of data.tokens; track $index) {
          <span class="skill-tag">{{ skill }}</span>
        }
      </div>

      <div class="form-group">
        <label for="experience">Experience (in years)</label>
        <input type="number" id="experience" [(ngModel)]="experience" name="experience" required />
      </div>

      <div class="form-group">
        <label for="skills">Skills</label>
        <input
          type="text"
          id="skills"
          [(ngModel)]="skills"
          name="skills"
          placeholder="e.g., Angular, Python"
          required
        />
      </div>

      <button type="submit">Save Profile</button>
    </form>
  </div>
</div>
