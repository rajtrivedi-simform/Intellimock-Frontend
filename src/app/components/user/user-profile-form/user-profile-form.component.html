<app-header></app-header>
<div class="user-form-container">
  <div class="user-form-card">
    <h1>Update Your Profile</h1>

    <form (ngSubmit)="submitForm()">
      <div class="form-group">
        <label for="resume">Upload Resume (PDF only)</label>
        <div class="file-upload">
          <input type="file" id="resume" (change)="onResumeUpload($event)" accept=".pdf" required />
          <span class="file-hint">{{
            resumeFile ? resumeFile.name : 'Drop your resume here or click to browse'
          }}</span>
        </div>
      </div>

      <div class="form-group">
        <label for="experience">Experience (in years)</label>
        <input
          type="number"
          id="experience"
          [(ngModel)]="experience"
          name="experience"
          required
          max="15"
        />
      </div>

      <div class="form-group">
        <label for="skills">Skills</label>
        <input
          type="text"
          id="skills"
          [(ngModel)]="skills"
          name="skills"
          placeholder="e.g., Angular, Python"
          required
        />
      </div>
      <div class="skills-list" *ngIf="data?.length">
        <h3>Extracted Skills</h3>
        @for (skill of data; track $index) {
          <span class="skill-tag" (click)="handleSkill($index)"
            >{{ skill }} <i class="bi bi-x"></i
          ></span>
        }
      </div>

      <button type="submit">Save Profile</button>
    </form>
  </div>
</div>
