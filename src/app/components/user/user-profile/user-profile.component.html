<app-header></app-header>
<div class="profile-card">
    <div class="avatar">{{ user.fullName[0] }}</div>
    <div class="info">
        <h2>{{ user.fullName }}</h2>
        <p>{{ user.email }}</p>
    </div>
</div>

<div class="history-container">
    <h3>Interview History</h3>

    <div class="tabs">
        <button (click)="activeTab = 'mock'" [class.active]="activeTab === 'mock'">Mock Interviews</button>
        <button (click)="activeTab = 'code'" [class.active]="activeTab === 'code'">Code Interviews</button>
    </div>

    <div class="interview-list" *ngIf="activeTab === 'mock'">
        <div class="interview-card" *ngFor="let interview of mockInterviews">
            <h4>{{ interview.date | date:'mediumDate' }}</h4>
            <p>{{ interview.summary }}</p>
        </div>
    </div>

    <div class="interview-list" *ngIf="activeTab === 'code'">
        <div class="interview-card" *ngFor="let interview of codeInterviews">
            <h4>{{ interview.date | date:'mediumDate' }}</h4>
            <p>{{ interview.questionTitle }}</p>
        </div>
    </div>
</div>
